body{background:#faf8f5;color:#2c2c2c;font-family:'Noto Serif SC',serif;line-height:1.8;min-height:100vh}
.paper{max-width:680px;margin:0 auto;padding:48px 24px 72px}
.mh{border-bottom:2px solid #2c2c2c;padding-bottom:20px;margin-bottom:36px}

.row:hover{background:#fffbf5;margin:0 -12px;padding:16px 12px;border-radius:6px}
.row.today{background:#fff9ed;margin:0 -12px;padding:16px 12px;border-radius:6px;border-bottom:2px solid #d4a853}
.date{font-size:13px;color:#999;font-weight:500;white-space:nowrap}
.head{font-size:15px;color:#1a1a1a;font-weight:500}
.stat{font-size:12px;color:#bbb;text-align:right;line-height:1.5}
.today .date{color:#b8860b}.today .head{font-weight:600}
.foot{text-align:center;margin-top:48px;font-size:11px;color:#bab6af;letter-spacing:2px}
.empty{text-align:center;padding:80px 0;color:#ccc;font-size:14px}
@media(max-width:480px){
  .paper{padding:28px 14px 56px}
  .row{grid-template-columns:90px 1fr;gap:8px}
  .stat{display:none}
}
