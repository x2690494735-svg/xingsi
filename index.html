<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>XingSi</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --surface: #1a1a24;
  --surface2: #22222e;
  --border: rgba(255,255,255,0.06);
  --gold: #c9a96e;
  --gold-dim: rgba(201,169,110,0.12);
  --text: #d8d4c8;
  --text-dim: #777;
  --radius: 16px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  height:100%;overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans SC',sans-serif;
  font-weight:300;
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
}
body{
  display:flex;flex-direction:column;
  max-width:720px;margin:0 auto;
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
  position:relative;
}

/* header */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  background:rgba(13,13,13,0.95);
  backdrop-filter:blur(12px);
  z-index:10;flex-shrink:0;
}
.header h1{
  font-family:'Noto Serif SC',serif;
  font-size:1rem;font-weight:600;
  color:var(--gold);
  letter-spacing:3px;
}
.header button{
  background:none;border:1px solid rgba(255,255,255,0.1);
  color:var(--text-dim);padding:6px 12px;
  border-radius:6px;font-size:0.75rem;
  font-family:inherit;cursor:pointer;
  letter-spacing:1px;
}
.header button:active{background:var(--surface2);}

/* messages */
.messages{
  flex:1;overflow-y:auto;
  padding:16px;
  display:flex;flex-direction:column;
  gap:16px;
  -webkit-overflow-scrolling:touch;
}
.msg{
  display:flex;gap:10px;
  max-width:92%;
  animation:in 0.25s ease;
}
@keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg.assistant{align-self:flex-start;}

.avatar{
  width:32px;height:32px;border-radius:50%;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:0.7rem;font-weight:600;
}
.msg.user .avatar{background:var(--gold-dim);color:var(--gold);}
.msg.assistant .avatar{background:rgba(255,255,255,0.06);color:var(--text-dim);}

.bubble{
  padding:12px 16px;border-radius:var(--radius);
  font-size:0.9rem;line-height:1.7;
  word-break:break-word;
}
.msg.user .bubble{background:var(--surface2);color:var(--text);border-bottom-right-radius:4px;}
.msg.assistant .bubble{background:var(--surface);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--border);}

.bubble p{margin-bottom:8px;}
.bubble p:last-child{margin-bottom:0;}
.bubble strong{color:var(--gold);font-weight:500;}

.typing{
  align-self:flex-start;display:flex;gap:6px;padding:4px 0;
}
.typing span{
  width:5px;height:5px;border-radius:50%;
  background:var(--text-dim);
  animation:dot 1.2s infinite;
}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes dot{0%,60%,100%{opacity:0.2}30%{opacity:1}}

/* input */
.input-bar{
  display:flex;gap:8px;
  padding:12px 16px calc(12px + var(--safe-bottom));
  border-top:1px solid var(--border);
  background:rgba(13,13,13,0.95);
  backdrop-filter:blur(12px);
  flex-shrink:0;
}
.input-bar textarea{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:12px 16px;
  color:var(--text);font-family:inherit;font-size:0.9rem;
  resize:none;outline:none;
  max-height:100px;line-height:1.5;
}
.input-bar textarea:focus{border-color:rgba(201,169,110,0.3);}
.input-bar textarea::placeholder{color:var(--text-dim);}
.input-bar button{
  width:44px;height:44px;border-radius:50%;
  background:var(--gold);border:none;
  color:var(--bg);font-size:1.2rem;
  flex-shrink:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity 0.2s;
}
.input-bar button:disabled{opacity:0.3;}
.input-bar button:active{opacity:0.7;}

/* setup overlay */
.setup{
  position:fixed;inset:0;background:rgba(0,0,0,0.9);
  display:flex;align-items:center;justify-content:center;
  z-index:100;padding:24px;
}
.setup .card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:32px 24px;max-width:360px;
  text-align:center;
}
.setup h2{font-family:'Noto Serif SC',serif;color:var(--gold);margin-bottom:8px;font-size:1.2rem;font-weight:400;}
.setup p{color:var(--text-dim);font-size:0.85rem;margin-bottom:20px;line-height:1.6;}
.setup input{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;padding:12px;color:var(--text);
  font-size:0.85rem;text-align:center;margin-bottom:16px;
  font-family:monospace;outline:none;
}
.setup input:focus{border-color:var(--gold);}
.setup button{
  width:100%;padding:12px;background:var(--gold);
  color:var(--bg);border:none;border-radius:8px;
  font-family:inherit;font-size:0.9rem;cursor:pointer;
  letter-spacing:2px;
}

.empty{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  flex:1;gap:12px;color:var(--text-dim);
}
.empty .logo{
  font-family:'Noto Serif SC',serif;
  font-size:1.8rem;color:var(--gold);
  letter-spacing:6px;
  margin-bottom:4px;
}
.empty p{font-size:0.85rem;}

/* markdown */
.bubble code{background:rgba(255,255,255,0.05);padding:2px 6px;border-radius:4px;font-size:0.8rem;}
.bubble pre{background:rgba(0,0,0,0.3);padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0;font-size:0.8rem;}
.bubble ul,.bubble ol{padding-left:20px;margin:6px 0;}
.bubble li{margin-bottom:4px;}
.bubble blockquote{border-left:2px solid var(--gold);padding-left:12px;color:var(--text-dim);margin:8px 0;}
.bubble hr{border:none;border-top:1px solid var(--border);margin:12px 0;}
</style>
</head>
<body>

<div class="header">
  <h1>XingSi</h1>
  <button onclick="clearChat()">新对话</button>
</div>

<div class="messages" id="msgs">
  <div class="empty">
    <div class="logo">行 思</div>
    <p>非共识，窄切口，深论证</p>
  </div>
</div>

<div class="input-bar">
  <textarea id="input" rows="1" placeholder="说点什么..." onkeydown="onKey(event)"></textarea>
  <button id="sendBtn" onclick="send()" disabled>&#8593;</button>
</div>

<div class="setup" id="setup">
  <div class="card">
    <h2>XingSi</h2>
    <p>输入 DeepSeek API Key<br>密钥仅保存在本机</p>
    <input type="password" id="apikey" placeholder="sk-...">
    <button onclick="saveKey()">开 始</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'xingsi_chats';
const SYSTEM_PROMPT = `你是行思君（谢程宇）的 AI 助手，一个深度思考伙伴。

你的风格：
- 不写共识，只找非共识。从更小更窄的角度切入问题
- 做理性论证和推理，不堆砌信息
- 回复简洁有力，像在笔记本边缘写下的灵感批注
- 中文，不用 emoji

你可以帮忙：写文章（围绕非共识）、分析问题、代码开发、内容创作。
当讨论写作时，永远从"这个主题的非共识是什么"开始想。`;

let apiKey = '';
let chats = [];
let currentChat = [];
let isGenerating = false;

// Init
try{
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){const d=JSON.parse(saved);chats=d.chats||[];apiKey=d.key||'';}
}catch(e){}
if(apiKey) document.getElementById('setup').style.display='none';

document.getElementById('input').addEventListener('input',function(){
  document.getElementById('sendBtn').disabled = !this.value.trim() || isGenerating;
  this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';
});

function saveKey(){
  const k = document.getElementById('apikey').value.trim();
  if(!k)return;
  apiKey=k;
  save();
  document.getElementById('setup').style.display='none';
}

function save(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify({key:apiKey,chats}));}catch(e){}
}

function clearChat(){
  if(currentChat.length) chats.push([...currentChat]);
  currentChat=[];
  document.getElementById('msgs').innerHTML='<div class="empty"><div class="logo">行 思</div><p>非共识，窄切口，深论证</p></div>';
  save();
}

function onKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
}

function addMsg(role,content){
  currentChat.push({role,content});
  const div=document.createElement('div');
  div.className='msg '+role;
  const ava=role==='user'?'我':'思';
  div.innerHTML=`<div class="avatar">${ava}</div><div class="bubble">${format(content)}</div>`;
  const empty=document.querySelector('.empty');
  if(empty)empty.remove();
  document.getElementById('msgs').appendChild(div);
  document.getElementById('msgs').scrollTop=document.getElementById('msgs').scrollHeight;
}

function showTyping(){
  const div=document.createElement('div');
  div.className='typing';
  div.id='typing';
  div.innerHTML='<span></span><span></span><span></span>';
  document.getElementById('msgs').appendChild(div);
  document.getElementById('msgs').scrollTop=document.getElementById('msgs').scrollHeight;
}

function hideTyping(){
  const t=document.getElementById('typing');
  if(t)t.remove();
}

function format(text){
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```(\w*)\n?([\s\S]*?)```/g,'<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>')
    .replace(/^<p>|<\/p>$/g,'')
    .replace(/^- (.+)/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s,'<ul>$1</ul>');
}

async function send(){
  if(isGenerating)return;
  const input=document.getElementById('input');
  const text=input.value.trim();
  if(!text)return;
  if(!apiKey){document.getElementById('setup').style.display='flex';return;}

  input.value='';input.style.height='auto';
  document.getElementById('sendBtn').disabled=true;
  isGenerating=true;

  addMsg('user',text);
  showTyping();

  const msgs=[
    {role:'system',content:SYSTEM_PROMPT},
    ...currentChat.slice(-20)
  ];

  try{
    const resp=await fetch('https://api.deepseek.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({model:'deepseek-v4-pro',messages:msgs,max_tokens:1200})
    });
    const data=await resp.json();
    const reply=data.choices?.[0]?.message?.content||'...';
    hideTyping();
    addMsg('assistant',reply);
  }catch(e){
    hideTyping();
    addMsg('assistant','请求失败：'+e.message);
  }

  save();
  isGenerating=false;
  document.getElementById('sendBtn').disabled=false;
  document.getElementById('input').focus();
}
</script>
</body>
</html>
